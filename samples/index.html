<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OverlayLib Digital Clock</title>
  <link rel="stylesheet" href="./index.css">
</head>
<body>
  <main class="clock-module" id="box" aria-label="Draggable digital clock overlay">
    <button class="drag-handle" id="dragHandle" type="button" aria-label="Drag the clock overlay">
      Drag here
    </button>
    <section class="display" aria-live="polite">
      <h1 class="time" id="time">00:00:00</h1>
      <p class="date" id="date">Loading date...</p>
    </section>
  </main>

  <script src="./index.js"></script>
</body>
</html>
