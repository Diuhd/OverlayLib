<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OverlayLib Sample</title>
  <style>
    :root {
      color-scheme: dark;
      --panel-bg: rgba(15, 23, 42, 0.82);
      --panel-border: rgba(255, 255, 255, 0.16);
      --panel-highlight: rgba(125, 211, 252, 0.24);
      --text: #eff6ff;
      --muted: #cbd5e1;
      --accent: #7dd3fc;
      --shadow: rgba(2, 6, 23, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      user-select: none;
    }

    body {
      position: relative;
    }

    .box {
      position: fixed;
      left: 0;
      top: 0;
      width: min(360px, calc(100vw - 32px));
      padding: 22px 24px;
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent),
        var(--panel-bg);
      box-shadow:
        0 22px 50px var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transform: translate3d(var(--box-x, 0px), var(--box-y, 0px), 0);
      cursor: grab;
      touch-action: none;
      backdrop-filter: blur(16px);
      will-change: transform;
    }

    .box.dragging {
      cursor: grabbing;
      box-shadow:
        0 18px 32px var(--shadow),
        0 0 0 1px var(--panel-highlight);
      backdrop-filter: none;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      color: var(--text);
      font-size: 1.75rem;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.98rem;
    }

    .stage {
      position: relative;
      height: 120px;
      margin-top: 18px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at 20% 50%, rgba(125, 211, 252, 0.14), transparent 30%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      overflow: hidden;
    }

    .track {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 50%;
      height: 8px;
      border-radius: 999px;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    .progress {
      position: absolute;
      inset: 0 auto 0 0;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #38bdf8, #7dd3fc);
      transform: scaleX(0);
      transform-origin: left center;
      will-change: transform;
    }

    .orb {
      position: absolute;
      top: 50%;
      left: 0;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      transform: translate3d(18px, -50%, 0);
      background:
        radial-gradient(circle at 35% 35%, #ffffff, #7dd3fc 45%, #0ea5e9 100%);
      box-shadow:
        0 0 0 6px rgba(125, 211, 252, 0.12),
        0 10px 24px rgba(14, 165, 233, 0.35);
      will-change: transform;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.82rem;
      font-variant-numeric: tabular-nums;
    }

    .hint {
      display: inline-flex;
      margin-top: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main class="box" id="box" aria-label="Draggable overlay sample">
    <div class="eyebrow">OverlayLib</div>
    <h1>Drag Me</h1>
    <p>
      This sample keeps the page transparent and renders a single movable panel
      in the middle of the view.
    </p>
    <section class="stage" aria-label="165 hertz animation demo">
      <div class="track">
        <div class="progress" id="progress"></div>
      </div>
      <div class="orb" id="orb"></div>
    </section>
    <div class="stats">
      <span id="rate">Target: 165 Hz</span>
      <span id="cycle">Cycle: 0</span>
    </div>
    <div class="hint">Click and drag the box</div>
  </main>

  <script>
    const box = document.getElementById("box");
    const stage = box.querySelector(".stage");
    const orb = document.getElementById("orb");
    const progress = document.getElementById("progress");
    const cycle = document.getElementById("cycle");

    let dragging = false;
    let offsetX = 0;
    let offsetY = 0;
    let animationFrameId = 0;
    let lastFrameTime = 0;
    let cycleCount = 0;
    let cycleProgress = 0;
    let stageWidth = 0;
    let boxX = 0;
    let boxY = 0;
    let targetBoxX = 0;
    let targetBoxY = 0;

    const targetHz = 165;
    const frameStepMs = 1000 / targetHz;
    const cycleDurationMs = 1400;

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function applyBoxPosition() {
      box.style.setProperty("--box-x", `${boxX}px`);
      box.style.setProperty("--box-y", `${boxY}px`);
    }

    function clampBoxPosition(x, y) {
      const width = box.offsetWidth;
      const height = box.offsetHeight;

      return {
        x: clamp(x, 0, window.innerWidth - width),
        y: clamp(y, 0, window.innerHeight - height),
      };
    }

    function queueBoxMove(clientX, clientY) {
      const clamped = clampBoxPosition(clientX - offsetX, clientY - offsetY);
      targetBoxX = clamped.x;
      targetBoxY = clamped.y;
    }

    function updateStageMetrics() {
      stageWidth = stage.clientWidth;
    }

    function centerBox() {
      const centered = clampBoxPosition(
        (window.innerWidth - box.offsetWidth) / 2,
        (window.innerHeight - box.offsetHeight) / 2,
      );

      boxX = centered.x;
      boxY = centered.y;
      targetBoxX = boxX;
      targetBoxY = boxY;
      applyBoxPosition();
    }

    function renderAnimation() {
      const minX = 18;
      const maxX = stageWidth - 18;
      const x = minX + (maxX - minX) * cycleProgress;
      const scale = 0.88 + Math.sin(cycleProgress * Math.PI) * 0.35;
      const glow = 0.12 + cycleProgress * 0.28;

      orb.style.transform = `translate3d(${x}px, -50%, 0) scale(${scale})`;
      orb.style.boxShadow =
        `0 0 0 6px rgba(125, 211, 252, ${glow}), 0 10px 24px rgba(14, 165, 233, 0.35)`;
      progress.style.transform = `scaleX(${cycleProgress})`;
      cycle.textContent = `Cycle: ${cycleCount}`;
    }

    function animate(now) {
      if (dragging && (boxX !== targetBoxX || boxY !== targetBoxY)) {
        boxX = targetBoxX;
        boxY = targetBoxY;
        applyBoxPosition();
      }

      if (lastFrameTime === 0) {
        lastFrameTime = now;
      }

      const elapsed = now - lastFrameTime;

      if (elapsed >= frameStepMs) {
        const steps = Math.floor(elapsed / frameStepMs);
        lastFrameTime += steps * frameStepMs;
        cycleProgress += (steps * frameStepMs) / cycleDurationMs;

        if (cycleProgress >= 1) {
          cycleProgress -= Math.floor(cycleProgress);
          cycleCount += 1;
        }

        renderAnimation();
      }

      animationFrameId = window.requestAnimationFrame(animate);
    }

    box.addEventListener("pointerdown", (event) => {
      dragging = true;
      box.classList.add("dragging");

      const rect = box.getBoundingClientRect();
      offsetX = event.clientX - rect.left;
      offsetY = event.clientY - rect.top;

      box.setPointerCapture(event.pointerId);
      queueBoxMove(event.clientX, event.clientY);
    });

    box.addEventListener("pointermove", (event) => {
      if (!dragging) {
        return;
      }

      queueBoxMove(event.clientX, event.clientY);
    });

    function stopDragging(event) {
      if (!dragging) {
        return;
      }

      dragging = false;
      box.classList.remove("dragging");

      if (event) {
        box.releasePointerCapture(event.pointerId);
      }
    }

    box.addEventListener("pointerup", stopDragging);
    box.addEventListener("pointercancel", stopDragging);
    window.addEventListener("resize", () => {
      updateStageMetrics();

      const clamped = clampBoxPosition(boxX, boxY);
      boxX = clamped.x;
      boxY = clamped.y;
      targetBoxX = boxX;
      targetBoxY = boxY;
      applyBoxPosition();
      renderAnimation();
    });

    updateStageMetrics();
    centerBox();
    renderAnimation();
    animationFrameId = window.requestAnimationFrame(animate);
  </script>
</body>
</html>
